<!DOCTYPE html>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
}
.container{
    max-width:1100px;
    margin:40px auto;
    background:#ffffff;
    padding:30px;
    border-radius:12px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
}
h1{
    text-align:center;
    color: #1e293b;
}
.materia-badge {
    display: block;
    text-align: center;
    background: #f1f5f9;
    padding: 10px;
    border-radius: 8px;
    margin-bottom: 20px;
    font-weight: bold;
    color: #475569;
    border: 1px solid #e2e8f0;
}
.question{
    background:#f9fafb;
    padding:18px;
    border-radius:10px;
    margin-bottom:20px;
    border-left:6px solid #cbd5e1;
}
.question.correct{border-left-color:#16a34a;}
.question.wrong{border-left-color:#dc2626;}
label{
    display:block;
    padding:8px;
    margin:5px 0;
    border-radius:6px;
    cursor:pointer;
    transition: 0.2s;
}
label:hover { background: #f1f5f9; }
label.correct{background:#dcfce7 !important;}
label.wrong{background:#fee2e2 !important;}
button{
    padding:14px;
    border:none;
    border-radius:8px;
    font-size:16px;
    margin-top:10px;
    cursor:pointer;
    font-weight: bold;
    transition: 0.3s;
}
.nav-buttons {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 20px;
}
.sortear{background:#2563eb; color:white; width: 100%;}
.proximo{background:#6366f1; color:white; width: 100%;}
.finalizar{background:#16a34a; color:white; width:100%; margin-top: 20px;}
.resultado{
    font-size:20px;
    font-weight:bold;
    text-align:center;
    margin-top:20px;
    padding: 15px;
    border-radius: 8px;
}
</style>
</head>

// --- LÓGICA DO SISTEMA ---
let materiaAtual = "tecnologia";
let perguntas = [];
let respostas = [];

function alternarMateria() {
    materiaAtual = (materiaAtual === "tecnologia") ? "fge" : "tecnologia";
    document.getElementById("materia-nome").innerText = "Matéria: " + bancoDados[materiaAtual].nome;
    document.getElementById("resultado").innerHTML = "";
    document.getElementById("resultado").style.background = "transparent";
    sortear();
}

function embaralhar(arr){
    return arr.map(v=>({v, s:Math.random()}))
              .sort((a,b)=>a.s-b.s)
              .map(o=>o.v);
}

function prepararPerguntas(){
    // Pega as questões da matéria atual do banco de dados
    let baseOriginal = JSON.parse(JSON.stringify(bancoDados[materiaAtual].questoes));
    
    perguntas = embaralhar(baseOriginal).map(p => {
        let alternativas = embaralhar(
            p.a.map((texto, idx) => ({
                texto,
                correta: idx === p.c
            }))
        );
        return {
            q: p.q,
            a: alternativas.map(a => a.texto),
            c: alternativas.findIndex(a => a.correta)
        };
    });
    respostas = new Array(perguntas.length).fill(null);
}

function render(){
    const quiz=document.getElementById("quiz");
    quiz.innerHTML="";
    
    perguntas.forEach((p,i)=>{
        const div=document.createElement("div");
        div.className="question";
        const titulo=document.createElement("p");
        titulo.innerHTML=`<strong>${i+1}. ${p.q}</strong>`;
        div.appendChild(titulo);

        p.a.forEach((alt,j)=>{
            const label=document.createElement("label");
            const input=document.createElement("input");
            input.type="radio";
            input.name="q"+i;
            input.checked=respostas[i]===j;
            input.onclick=()=>{
                respostas[i]=j;
                render();
            };
            label.appendChild(input);
            label.append(" "+alt);

            if(respostas[i]!==null){
                if(j===p.c){
                    label.className="correct";
                    if(respostas[i] === j) div.classList.add("correct");
                } else if(j===respostas[i]){
                    label.className="wrong";
                    div.classList.add("wrong");
                }
            }
            div.appendChild(label);
        });
        quiz.appendChild(div);
    });
}

function sortear(){
    prepararPerguntas();
    document.getElementById("resultado").innerHTML="";
    document.getElementById("resultado").style.background = "transparent";
    render();
    window.scrollTo(0,0);
}

function finalizar(){
    let pontos=0;
    let total = perguntas.length;
    let todasRespondidas = true;

    respostas.forEach((r,i)=>{
        if(r===null) todasRespondidas = false;
        if(r===perguntas[i].c) pontos++;
    });

    if(!todasRespondidas) {
        if(!confirm("Você não respondeu todas as questões. Deseja finalizar assim mesmo?")) return;
    }

    const resDiv = document.getElementById("resultado");
    const perc = (pontos/total)*100;
    
    resDiv.innerHTML = `Você acertou ${pontos} de ${total} questões (${perc.toFixed(1)}%).`;
    resDiv.style.background = perc >= 70 ? "#dcfce7" : "#fee2e2";
    resDiv.style.color = perc >= 70 ? "#16a34a" : "#dc2626";
    
    window.scrollTo(0, document.body.scrollHeight);
}

// Inicia o sistema
prepararPerguntas();
render();
</script>
</body>
</html>
